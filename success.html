<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Success - Getinkvision</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1565c0,#42a5f5);
overflow:hidden;
position:relative;
}

/* BACKGROUND CIRCLES */

.circle1{
position:absolute;
width:350px;
height:350px;
background:rgba(255,255,255,0.08);
border-radius:50%;
top:-120px;
left:-120px;
}

.circle2{
position:absolute;
width:300px;
height:300px;
background:rgba(255,255,255,0.08);
border-radius:50%;
bottom:-120px;
right:-120px;
}

/* SUCCESS BOX */

.success-box{
width:550px;
background:white;
padding:60px 50px;
border-radius:30px;
text-align:center;
box-shadow:0 15px 45px rgba(0,0,0,0.2);
position:relative;
z-index:10;
animation:pop 0.6s ease;
}

/* ANIMATION */

@keyframes pop{

0%{
transform:scale(0.7);
opacity:0;
}

100%{
transform:scale(1);
opacity:1;
}

}

/* CHECKMARK */

.checkmark{
width:120px;
height:120px;
background:#2ecc71;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
margin:auto;
font-size:60px;
color:white;
margin-bottom:30px;
box-shadow:0 10px 25px rgba(46,204,113,0.3);
}

/* TITLE */

.success-box h1{
font-size:42px;
color:#1565c0;
margin-bottom:18px;
}

/* TEXT */

.success-box p{
font-size:17px;
line-height:1.8;
color:#666;
margin-bottom:35px;
}

/* ORDER DETAILS */

.order-box{
background:#f5f8ff;
padding:22px;
border-radius:18px;
margin-bottom:35px;
}

.order-box p{
margin:10px 0;
font-size:16px;
color:#444;
}

/* BUTTONS */

.buttons{
display:flex;
gap:18px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
padding:14px 28px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
text-decoration:none;
}

/* PRIMARY */

.primary-btn{
background:linear-gradient(90deg,#1565c0,#42a5f5);
color:white;
}

.primary-btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(21,101,192,0.3);
}

/* SECONDARY */

.secondary-btn{
background:#f1f4f9;
color:#1565c0;
}

.secondary-btn:hover{
background:#e3ebf8;
}

/* RESPONSIVE */

@media(max-width:650px){

.success-box{
width:92%;
padding:45px 25px;
}

.success-box h1{
font-size:34px;
}

.checkmark{
width:100px;
height:100px;
font-size:50px;
}

}

</style>

</head>

<body>

<div class="circle1"></div>
<div class="circle2"></div>

<div class="success-box">

<div class="checkmark">
✓
</div>

<h1>Payment Successful!</h1>

<p>
Thank you for your order.  
Your payment has been completed successfully and your order is now being processed.
</p>

<div class="order-box">

<p><strong>Order ID:</strong> #GIV2026</p>

<p><strong>Estimated Delivery:</strong> 2 - 4 Business Days</p>

<p><strong>Status:</strong> Confirmed ✅</p>

</div>

<div class="buttons">

<a href="index.html" class="btn primary-btn">
Go To Home
</a>

<a href="products.html" class="btn secondary-btn">
Continue Shopping
</a>

</div>

</div>

</body>
</html>
